name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Smoke (boot server)
        env:
          PARSEABLE_URL: http://localhost:9999
          PARSEABLE_USERNAME: admin
          PARSEABLE_PASSWORD: admin
        run: |
          set -e
          node dist/server.js < /dev/null &
          PID=$!
          sleep 1
          if kill -0 $PID 2>/dev/null; then
            kill $PID
            echo "Server started cleanly"
          else
            echo "Server failed to boot"
            exit 1
          fi
